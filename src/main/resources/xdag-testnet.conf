# Admin Config
admin.telnet.ip = 127.0.0.1
admin.telnet.port = 6001
admin.telnet.password = ADMIN_TELNET_PASSWORD

# Pool Config
pool.ip = 127.0.0.1
pool.port = 7001
pool.tag = XdagJ

# Node config
node.ip = 127.0.0.1
node.port = 8001
node.maxInboundConnectionsPerIp = 8
node.whiteIPs = ["127.0.0.1:8001","127.0.0.1:8002"]
node.generate.block.enable = true

# Node transaction history config
node.transaction.history.enable = true

# HTTP API Config
# Enable/disable HTTP API server
rpc.http.enabled = true

# HTTP server host and port
rpc.http.host = 127.0.0.1
rpc.http.port = 10001

# HTTPS configuration (optional, for testing with SSL)
# rpc.http.https.enabled = false
# rpc.http.https.certFile = /path/to/cert.pem
# rpc.http.https.keyFile = /path/to/key.pem

# CORS configuration
# rpc.http.cors.origins = "*"

# HTTP request size limit (in bytes, default 1MB)
# rpc.http.maxContentLength = 1048576

# Netty thread pool configuration
# rpc.http.bossThreads = 1
# rpc.http.workerThreads = 4

# API authentication (optional, for testing)
# Format: "apiKey:permission" where permission is PUBLIC, READ, or WRITE
# rpc.http.auth.enabled = false
# rpc.http.auth.apiKeys = [
#   "test-read-key:READ",
#   "test-write-key:WRITE"
# ]

# Randomx Config
randomx.flags.fullmem = false