openapi: 3.0.3
info:
  title: XDAG v5.1 Blockchain API
  version: 5.1.0
  description: |
    XDAG blockchain API supporting both JSON-RPC 2.0 and RESTful interfaces.

    ## Features
    - JSON-RPC 2.0 compatible (Ethereum-style)
    - RESTful endpoints for easy integration
    - Auto-generated SDKs for multiple languages

    ## Data Types
    - **Hex Numbers**: All numbers use hex format with `0x` prefix (e.g., `"0x1234"`)
    - **Addresses**: Base58 encoded 20-byte addresses (e.g., `"4dutRdvFZJdKaPZXhdfgLMoujc9N3CFouZVs8JJi"`)
    - **Amounts**: Decimal strings with 9 decimals (e.g., `"1000.123456789"`)

  contact:
    name: XDAG Development Team
    url: https://github.com/XDagger/xdagj
  license:
    name: MIT License
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:10001
    description: Local development node
  - url: https://node.xdag.io
    description: XDAG mainnet public node

tags:
  - name: Accounts
    description: Account and balance operations
  - name: Blocks
    description: Block query operations
  - name: Transactions
    description: Transaction operations
  - name: Network
    description: Network and node information
  - name: JSON-RPC
    description: JSON-RPC 2.0 batch operations

paths:
  # ========== JSON-RPC Endpoint ==========
  /rpc:
    post:
      tags:
        - JSON-RPC
      summary: JSON-RPC 2.0 endpoint
      description: |
        Standard JSON-RPC 2.0 interface compatible with Ethereum tools.
        Supports both single requests and batch requests.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/JsonRpcRequest'
                - type: array
                  items:
                    $ref: '#/components/schemas/JsonRpcRequest'
            examples:
              singleRequest:
                summary: Single request
                value:
                  jsonrpc: "2.0"
                  method: "xdag_blockNumber"
                  params: []
                  id: 1
              batchRequest:
                summary: Batch request
                value:
                  - jsonrpc: "2.0"
                    method: "xdag_blockNumber"
                    params: []
                    id: 1
                  - jsonrpc: "2.0"
                    method: "xdag_coinbase"
                    params: []
                    id: 2
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/JsonRpcResponse'
                  - type: array
                    items:
                      $ref: '#/components/schemas/JsonRpcResponse'

  # ========== RESTful Account Endpoints ==========
  /api/v1/accounts:
    get:
      tags:
        - Accounts
      summary: Get local wallet accounts
      description: Returns list of accounts in the local wallet
      responses:
        '200':
          description: List of accounts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsResponse'

  /api/v1/accounts/{address}/balance:
    get:
      tags:
        - Accounts
      summary: Get account balance
      parameters:
        - $ref: '#/components/parameters/AddressParam'
        - $ref: '#/components/parameters/BlockNumberParam'
      responses:
        '200':
          description: Account balance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountBalanceResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/accounts/{address}/nonce:
    get:
      tags:
        - Accounts
      summary: Get account transaction count (nonce)
      parameters:
        - $ref: '#/components/parameters/AddressParam'
        - $ref: '#/components/parameters/BlockNumberParam'
      responses:
        '200':
          description: Account nonce
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountNonceResponse'

  # ========== RESTful Block Endpoints ==========
  /api/v1/blocks/number:
    get:
      tags:
        - Blocks
      summary: Get current block number
      description: Returns the height of the latest main chain block
      responses:
        '200':
          description: Current block number
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlockNumberResponse'

  /api/v1/blocks/{blockNumber}:
    get:
      tags:
        - Blocks
      summary: Get block by number
      parameters:
        - name: blockNumber
          in: path
          required: true
          description: Block number (hex `0x1234`), or `latest`, `earliest`, `pending`
          schema:
            type: string
          example: "latest"
        - name: fullTransactions
          in: query
          description: If true, return full transaction objects; if false, return only hashes
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Block details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlockDetailResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/blocks/hash/{blockHash}:
    get:
      tags:
        - Blocks
      summary: Get block by hash
      parameters:
        - name: blockHash
          in: path
          required: true
          description: Block hash (hex with 0x prefix)
          schema:
            type: string
            pattern: '^0x[0-9a-fA-F]{64}$'
          example: "0xabcd1234..."
        - name: fullTransactions
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Block details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlockDetailResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  # ========== RESTful Transaction Endpoints ==========
  /api/v1/transactions/{txHash}:
    get:
      tags:
        - Transactions
      summary: Get transaction by hash
      parameters:
        - name: txHash
          in: path
          required: true
          description: Transaction hash (hex with 0x prefix)
          schema:
            type: string
            pattern: '^0x[0-9a-fA-F]{64}$'
      responses:
        '200':
          description: Transaction details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionDetailResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/transactions:
    post:
      tags:
        - Transactions
      summary: Send raw transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - signedTransactionData
              properties:
                signedTransactionData:
                  type: string
                  description: Signed transaction data (hex with 0x prefix)
                  example: "0x..."
      responses:
        '200':
          description: Transaction submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendTransactionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  # ========== RESTful Network Endpoints ==========
  /api/v1/network/syncing:
    get:
      tags:
        - Network
      summary: Get sync status
      description: Returns sync status object if syncing, or false if fully synced
      responses:
        '200':
          description: Sync status
          content:
            application/json:
              schema:
                oneOf:
                  - type: boolean
                    example: false
                  - $ref: '#/components/schemas/SyncingResponse'

  /api/v1/network/chainId:
    get:
      tags:
        - Network
      summary: Get chain ID
      responses:
        '200':
          description: Chain ID and network type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChainIdResponse'

  /api/v1/network/peers/count:
    get:
      tags:
        - Network
      summary: Get peer count
      responses:
        '200':
          description: Number of connected peers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PeerCountResponse'

  /api/v1/network/protocol:
    get:
      tags:
        - Network
      summary: Get protocol version
      responses:
        '200':
          description: Protocol version
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProtocolVersionResponse'

  /api/v1/network/coinbase:
    get:
      tags:
        - Network
      summary: Get coinbase address
      description: Returns the mining reward address of this node
      responses:
        '200':
          description: Coinbase address
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoinbaseResponse'

  # ========== OpenAPI Spec Endpoint ==========
  /openapi.json:
    get:
      tags:
        - Documentation
      summary: Get OpenAPI specification
      description: Returns this OpenAPI spec in JSON format
      responses:
        '200':
          description: OpenAPI JSON
          content:
            application/json:
              schema:
                type: object

# ========== Components ==========
components:
  parameters:
    AddressParam:
      name: address
      in: path
      required: true
      description: Base58 encoded XDAG address
      schema:
        type: string
        pattern: '^[1-9A-HJ-NP-Za-km-z]{32,44}$'
      example: "4dutRdvFZJdKaPZXhdfgLMoujc9N3CFouZVs8JJi"

    BlockNumberParam:
      name: blockNumber
      in: query
      description: Block number (hex or `latest`/`earliest`)
      schema:
        type: string
        default: "latest"
      example: "latest"

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    # ========== JSON-RPC Schemas ==========
    JsonRpcRequest:
      type: object
      required:
        - jsonrpc
        - method
        - id
      properties:
        jsonrpc:
          type: string
          enum: ["2.0"]
        method:
          type: string
          example: "xdag_blockNumber"
        params:
          type: array
          items: {}
          default: []
        id:
          oneOf:
            - type: string
            - type: number

    JsonRpcResponse:
      type: object
      required:
        - jsonrpc
        - id
      properties:
        jsonrpc:
          type: string
          enum: ["2.0"]
        result:
          type: object
        error:
          $ref: '#/components/schemas/JsonRpcError'
        id:
          oneOf:
            - type: string
            - type: number

    JsonRpcError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object

    # ========== Account Schemas ==========
    AccountsResponse:
      type: object
      properties:
        accounts:
          type: array
          items:
            type: object
            properties:
              address:
                type: string
                description: Base58 address
              balance:
                type: string
                description: Balance in XDAG (decimal string)
              nonce:
                type: integer
                format: int64
              type:
                type: string
                enum: [hd, imported]

    AccountBalanceResponse:
      type: object
      properties:
        address:
          type: string
        balance:
          type: string
          description: Balance in XDAG units
        blockNumber:
          type: string
          description: Block number (hex with 0x prefix)

    AccountNonceResponse:
      type: object
      properties:
        address:
          type: string
        nonce:
          type: string
          description: Transaction count (hex with 0x prefix)
        blockNumber:
          type: string

    # ========== Block Schemas ==========
    BlockNumberResponse:
      type: object
      properties:
        blockNumber:
          type: string
          description: Current block number (hex with 0x prefix)
          example: "0x1234"

    BlockDetailResponse:
      type: object
      properties:
        number:
          type: string
          description: Block number (hex)
        hash:
          type: string
          description: Block hash (hex with 0x prefix)
        timestamp:
          type: string
          description: Block timestamp (hex)
        epoch:
          type: string
          description: Epoch number (hex)
        difficulty:
          type: string
          description: Difficulty (hex)
        coinbase:
          type: string
          description: Coinbase address (Base58)
        state:
          type: string
          enum: [main, orphan]
        transactionCount:
          type: integer
        transactions:
          type: array
          description: Array of transaction hashes or full transaction objects
          items:
            oneOf:
              - type: string
              - $ref: '#/components/schemas/TransactionDetailResponse'
        links:
          type: array
          items:
            type: object
            properties:
              hash:
                type: string
              height:
                type: string
              type:
                type: string
                enum: [parent, child]

    # ========== Transaction Schemas ==========
    TransactionDetailResponse:
      type: object
      properties:
        hash:
          type: string
        from:
          type: string
        to:
          type: string
        amount:
          type: string
          description: Amount in XDAG units
        fee:
          type: string
        nonce:
          type: string
        data:
          type: string
        signature:
          type: object
          properties:
            v:
              type: string
            r:
              type: string
            s:
              type: string
        blockNumber:
          type: string
        blockHash:
          type: string
        timestamp:
          type: string
        status:
          type: string
          enum: [confirmed, pending, failed]
        valid:
          type: boolean
        signatureValid:
          type: boolean

    SendTransactionResponse:
      type: object
      properties:
        transactionHash:
          type: string
        status:
          type: string

    # ========== Network Schemas ==========
    SyncingResponse:
      type: object
      properties:
        syncing:
          type: boolean
        startingBlock:
          type: string
        currentBlock:
          type: string
        highestBlock:
          type: string
        progress:
          type: number
          format: double

    ChainIdResponse:
      type: object
      properties:
        chainId:
          type: string
          description: "0x1=mainnet, 0x2=testnet, 0x3=devnet"
        networkType:
          type: string
          enum: [mainnet, testnet, devnet]

    PeerCountResponse:
      type: object
      properties:
        peerCount:
          type: string
          description: Peer count (hex with 0x prefix)

    ProtocolVersionResponse:
      type: object
      properties:
        protocolVersion:
          type: string
          example: "5.1.0"

    CoinbaseResponse:
      type: object
      properties:
        coinbase:
          type: string
          description: Base58 coinbase address

    # ========== Error Schema ==========
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        code:
          type: integer
